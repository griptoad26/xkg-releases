name: xkg-release

# Triggers:
#   - Tag push matching v* (e.g. v0.1.0, v0.2.0-rc1)         → real release
#   - Manual run via workflow_dispatch (choose version)       → ad-hoc build
#   - Nightly cron at 02:00 UTC (= 19:00 PDT)                 → smoke test
#
# Builds all 3 apps in parallel using a matrix strategy and uploads the
# real installers as a GitHub release. The same matrix can also be run
# locally to populate the /home/x2/xkg-releases/vX.Y.Z/ tree (see
# scripts/build.sh).
#
# Matrix (8 shards):
#   desktop  → ubuntu-22.04 (.deb/.AppImage/.rpm)
#            → windows-2022 (.exe NSIS + .msi WiX, unsigned)
#            → macos-14   (.dmg aarch64 + x86_64, unsigned)
#   mobile   → ubuntu-22.04 (Android .apk per-ABI + .aab, debug-signed)
#            → macos-14   (iOS .ipa, --no-codesign)
#   web      → ubuntu-22.04 (PyInstaller ELF)
#            → windows-2022 (PyInstaller PE)
#            → ubuntu-22.04 (Docker image tar — separate shard)
#
# Signing: all builds are UNSIGNED by default (see docs/SIGNING.md).
# The macos / ios / windows shards use --no-codesign / WiX-unsign so
# the pipeline never blocks on missing certs. Add SIGNING_CERT_P12,
# APPLE_TEAM_ID, KEYCHAIN_PWD secrets to flip to signed.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        default: "0.1.0"
      app:
        description: "Limit to a single app (blank = all)"
        required: false
        default: ""
  schedule:
    # Nightly at 02:00 UTC (= 19:00 PDT, runs while user is offline).
    # Local cron on the build host runs 1 hour later as a fallback.
    - cron: '0 2 * * *'

permissions:
  contents: write   # needed to create the release + upload assets
  packages: write

jobs:
  build:
    name: ${{ matrix.app }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # macos-14 shards can fail (e.g. Xcode license, code-signing, runner
    # quota). Mark them continue-on-error so a single macOS failure
    # doesn't block the rest of the matrix. The publish job still
    # succeeds with whatever artifacts were produced.
    continue-on-error: ${{ matrix.os == 'macos-14' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── desktop (Tauri 2.x, cross-platform) ──
          - app: desktop
            os: ubuntu-22.04
            build_cmd: |
              # Tauri's beforeBuildCommand runs 'npm run build' from the
              # frontend root (where package.json lives). Run npm ci
              # there first so vite is available.
              cd sources/xkg-desktop
              npm ci --no-audit --no-fund
              cd src-tauri
              # unsigned: pass --no-bundle signing flags via env if/when set
              cargo tauri build --bundles deb,appimage,rpm
            artifact_glob: |
              sources/xkg-desktop/src-tauri/target/release/bundle/deb/*.deb
              sources/xkg-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              sources/xkg-desktop/src-tauri/target/release/bundle/rpm/*.rpm
          - app: desktop
            os: windows-2022
            build_cmd: |
              cd sources/xkg-desktop
              npm ci --no-audit --no-fund
              cd src-tauri
              # unsigned MSIs (WiX runs but no cert sign)
              cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis,msi
            artifact_glob: |
              sources/xkg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              sources/xkg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - app: desktop
            os: macos-14
            # Real Mac runner required — Tauri's macOS bundler needs xcrun.
            # Builds BOTH Apple Silicon and Intel DMGs in one job.
            # UNSIGNED by default; see the Build step for the secret-driven
            # signing toggle (you can't use ${{ secrets.* }} inside a
            # matrix value — it has to be wired via env: at the step).
            build_cmd: |
              cd src-tauri
              cd sources/xkg-desktop
              npm ci --no-audit --no-fund
              if [ -n "$APPLE_SIGNING_IDENTITY" ] && [ -n "$APPLE_TEAM_ID" ]; then
                echo "::notice::Building SIGNED macOS DMGs"
                CARGO_TAURI_SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY" \
                  cargo tauri build --target aarch64-apple-darwin --bundles dmg
                CARGO_TAURI_SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY" \
                  cargo tauri build --target x86_64-apple-darwin --bundles dmg
              else
                echo "::notice::APPLE_SIGNING_IDENTITY/APPLE_TEAM_ID not set — building UNSIGNED DMGs"
                # Tauri's macOS bundler produces a .dmg without signing.
                # The resulting .dmg is installable after a one-time
                # "Open with Finder → Open" override.
                cargo tauri build --target aarch64-apple-darwin --bundles dmg
                cargo tauri build --target x86_64-apple-darwin --bundles dmg
              fi
            artifact_glob: |
              sources/xkg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              sources/xkg-desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          # ── mobile (Flutter) ──
          - app: mobile
            os: ubuntu-22.04
            setup: |
              sudo apt-get update
              sudo apt-get install -y openjdk-17-jdk-headless unzip
              echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
            build_cmd: |
              cd sources/xkg-mobile
              flutter pub get
              # --split-per-abi produces a smaller APK per architecture
              # (arm64-v8a, armeabi-v7a, x86_64) plus the universal "fat" APK
              flutter build apk --release --split-per-abi
              flutter build appbundle --release
            artifact_glob: |
              mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
              mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
              mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
              mobile/build/app/outputs/flutter-apk/app-release.apk
              mobile/build/app/outputs/bundle/release/app-release.aab
          - app: mobile
            os: macos-14
            # Real Mac runner required (Xcode).
            # --no-codesign + ExportOptions.plist with signing disabled
            # so we don't need a developer cert in CI. Signing is
            # toggled by the step-level env (secrets aren't allowed in
            # matrix values).
            build_cmd: |
              cd sources/xkg-mobile
              flutter pub get
              # iOS build: skip if ios/ platform hasn't been generated yet
              # (the xkg-mobile repo only has android/; flutter create ios
              # is a one-time setup step that's out of scope for this matrix).
              if [ -d ios ] && [ -f ios/Podfile ]; then
                if [ -f ios/ExportOptions.plist ] && [ -n "$APPLE_SIGNING_IDENTITY" ] && [ -n "$APPLE_TEAM_ID" ]; then
                  echo "::notice::Building SIGNED iOS IPA"
                  flutter build ipa --release \
                    --export-options-plist=ios/ExportOptions.plist
                else
                  echo "::notice::Building iOS IPA with --no-codesign (no signing identity in CI)"
                  flutter build ios --release --no-codesign
                fi
              else
                echo "::notice::Skipping iOS build — ios/ platform not configured in this repo. Run 'flutter create --platforms=ios .' locally and commit ios/ to enable."
                flutter build apk --release --split-per-abi || true
              fi
            artifact_glob: |
              mobile/build/ios/ipa/*.ipa
          # ── web (x-knowledge-graph Flask server) ──
          - app: web
            os: ubuntu-22.04
            build_cmd: |
              cd sources/x-knowledge-graph
              pip install -r requirements.txt
              pyinstaller xkg-v054.spec --clean
            artifact_glob: |
              sources/x-knowledge-graph/dist/xkg
          - app: web
            os: windows-2022
            build_cmd: |
              cd sources/x-knowledge-graph
              pip install -r requirements.txt
              pyinstaller xkg-v054.spec --clean
            artifact_glob: |
              sources/x-knowledge-graph/dist/xkg.exe
          - app: web
            os: ubuntu-22.04
            # Docker image shard — uses the SAME ubuntu-22.04 runner as the
            # PyInstaller linux shard, but is distinguished by `app=web`
            # + the docker build_cmd. Both run in parallel.
            # Note: docker buildx is preinstalled on ubuntu-22.04; we use
            # the legacy daemon because we just need a tarball, not push.
            build_cmd: |
              cd sources/x-knowledge-graph
              docker build -f Dockerfile.v054 -t xkg-server:${{ github.ref_name }} .
              docker save -o xkg-server-${{ github.ref_name }}.tar xkg-server:${{ github.ref_name }}
            artifact_glob: |
              sources/x-knowledge-graph/xkg-server-*.tar
        # Filter the matrix to a single app when the user passes
        # `inputs.app` on workflow_dispatch. The `exclude:` form with
        # `${{ }}` is rejected by the schema validator, so the
        # filtering is implemented as an `if:` guard on the Build +
        # Collect steps (see below). When `inputs.app` is empty,
        # every shard runs.
        # (The simpler `exclude + ${{ }}` form is rejected by the
        # schema validator, so we do it with a guard at step level.)

    steps:
      # The xkg-releases repo only contains the pipeline + manifest.
      # The actual source lives in three sibling repos that we check
      # out into the workspace's `sources/` dir. The build commands
      # below are still written assuming the legacy monorepo layout
      # (cd src-tauri / cd mobile / cd server), so we symlink each
      # source tree into the matching path after checkout.
      - name: Checkout xkg-releases (this repo)
        uses: actions/checkout@v4
        with:
          path: releases

      # Source repos are external to xkg-releases. Some are private
      # (e.g. x-knowledge-graph) and the default GITHUB_TOKEN has
      # read-only access to public repos in the same org but not
      # to private ones in other orgs. Mark the checkouts as
      # continue-on-error so a private-repo permission gap doesn't
      # fail the whole matrix; the build step will then surface a
      # clear "src-tauri not found" error pointing at the missing
      # PAT / fine-grained token that needs to be added.
      - name: Checkout xkg-desktop
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          # Use the user's PAT for private repo access
          token: ${{ secrets.ACTIONS_CHECKOUT_TOKEN }}
          repository: griptoad26/xkg-desktop
          path: sources/xkg-desktop

      - name: Checkout xkg-mobile
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          # Use the user's PAT for private repo access
          token: ${{ secrets.ACTIONS_CHECKOUT_TOKEN }}
          repository: griptoad26/xkg-mobile
          path: sources/xkg-mobile

      - name: Checkout x-knowledge-graph
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          # Use the user's PAT for private repo access
          token: ${{ secrets.ACTIONS_CHECKOUT_TOKEN }}
          repository: griptoad26/x-knowledge-graph
          path: sources/x-knowledge-graph

      - name: Symlink sources into expected paths
        shell: bash
        continue-on-error: true
        run: |
          set +e
          # xkg-desktop: Tauri project lives at src-tauri/ inside the repo
          [ -d sources/xkg-desktop ] && ln -sfn sources/xkg-desktop/src-tauri src-tauri
          # xkg-mobile: Flutter project IS the repo root (lib/, pubspec.yaml at top)
          [ -d sources/xkg-mobile ] && ln -sfn sources/xkg-mobile mobile
          # x-knowledge-graph: Flask project IS the repo root (main.py, core/, etc.)
          [ -d sources/x-knowledge-graph ] && ln -sfn sources/x-knowledge-graph server
          echo "=== workspace layout ==="
          ls -la src-tauri mobile server 2>&1 | head -10
          # On Windows, `ln -sfn` may not work; fall back to cmd mklink /D
          if [ ! -e server ] && [ -d sources/x-knowledge-graph ] && command -v cmd.exe >/dev/null 2>&1; then
            cmd //c "mklink /D server sources\\x-knowledge-graph" || true
          fi
          if [ ! -e src-tauri ] || [ ! -e mobile ] || [ ! -e server ]; then
            echo "::warning::One or more source checkouts were missing — the build will likely fail. Add a PAT as ACTIONS_CHECKOUT_TOKEN secret for private repos."
          fi

      - name: Setup Node (desktop only)
        if: matrix.app == 'desktop'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust (desktop only)
        if: matrix.app == 'desktop'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'windows-2022' && 'x86_64-pc-windows-msvc' || (matrix.os == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '') }}

      - name: Install tauri-cli (desktop only)
        if: matrix.app == 'desktop'
        shell: bash
        run: |
          # tauri-cli has hundreds of transitive deps; cold-cache install
          # can hit transient network errors. Retry up to 3 times.
          for i in 1 2 3; do
            if cargo install tauri-cli --version "^2" --locked; then
              exit 0
            fi
            echo "::warning::tauri-cli install attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "::error::tauri-cli install failed after 3 attempts"
          exit 1

      - name: Setup Flutter (mobile only)
        if: matrix.app == 'mobile'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Setup Python (web only)
        if: matrix.app == 'web'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java (mobile on linux)
        if: matrix.app == 'mobile' && matrix.os == 'ubuntu-22.04'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK (mobile on linux)
        if: matrix.app == 'mobile' && matrix.os == 'ubuntu-22.04'
        uses: android-actions/setup-android@v3

      - name: Run setup
        if: matrix.setup
        run: ${{ matrix.setup }}

      # If the user passed `app=desktop|mobile|web` on workflow_dispatch,
      # skip every shard whose matrix.app doesn't match. Implemented
      # inline in the `if:` of the Build + Collect steps below — no
      # separate env var is needed.

      - name: Build ${{ matrix.app }} on ${{ matrix.os }}
        if: ${{ inputs.app == '' || inputs.app == matrix.app }}
        # Secrets can't be referenced inside matrix values, so we
        # forward the Apple signing identity at the step level for
        # the macos-14 shards to consume.
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ${{ matrix.build_cmd }}
        shell: bash

      - name: Collect artifacts
        if: ${{ inputs.app == '' || inputs.app == matrix.app }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename to canonical filenames
        working-directory: dist
        run: |
          bash ../scripts/rename-artifacts.sh
          echo "--- final tree ---"
          find . -type f -not -name "*.sha256" | sort

      - name: Generate SHA256 checksums per category
        working-directory: dist
        run: |
          for cat in desktop/windows desktop/linux desktop/macos mobile/android mobile/ios web/linux web/windows web/docker; do
            if compgen -G "$cat/*" > /dev/null; then
              ( cd "$cat" && sha256sum * > checksums.sha256 )
            fi
          done
          # master checksum list
          sha256sum $(find . -type f -not -name "*.sha256") | sort > ALL_CHECKSUMS.sha256

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "XKG ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.rpm
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.apk
            dist/**/*.aab
            dist/**/*.ipa
            dist/**/*.tar
            dist/**/checksums.sha256
            dist/ALL_CHECKSUMS.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Nightly publish (additive) ──
  # Runs only when this workflow was triggered by the schedule. Creates (or
  # re-uploads to) a single rolling 'nightly' GitHub release tagged with the
  # current UTC date, so the GitHub `releases/latest/download/...` fallback
  # URL always points at a fresh nightly build. Marked prerelease so it
  # doesn't show up in stable upgrade prompts.
  publish-nightly:
    name: Publish nightly GitHub release
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename to canonical filenames
        working-directory: dist
        run: |
          bash ../scripts/rename-artifacts.sh
          echo "--- final tree ---"
          find . -type f -not -name "*.sha256" | sort

      - name: Generate SHA256 checksums per category
        working-directory: dist
        run: |
          for cat in desktop/windows desktop/linux desktop/macos mobile/android mobile/ios web/linux web/windows web/docker; do
            if compgen -G "$cat/*" > /dev/null; then
              ( cd "$cat" && sha256sum * > checksums.sha256 )
            fi
          done
          # master checksum list
          sha256sum $(find . -type f -not -name "*.sha256") | sort > ALL_CHECKSUMS.sha256

      - name: Compute nightly tag (YYYYMMDD, UTC)
        id: tag
        run: echo "tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Create / update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.tag.outputs.tag }}
          name: "XKG nightly (${{ steps.tag.outputs.tag }} UTC)"
          generate_release_notes: true
          prerelease: true
          # Overwrite assets on re-runs so the nightly release stays current
          # and never grows unboundedly.
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.rpm
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.apk
            dist/**/*.aab
            dist/**/*.ipa
            dist/**/*.tar
            dist/**/checksums.sha256
            dist/ALL_CHECKSUMS.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
